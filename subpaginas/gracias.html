<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! — Cambalache Technologies</title>
  <link rel="icon" href="../img/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #00A1E0;
      --dark:   #032D60;
      --darker: #010F21;
      --white:  #FFFFFF;
      --gray:   #8A9BB5;
      --accent: #00C9A7;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--darker);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: rgba(1,15,33,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,161,224,0.15);
    }
    nav .logo-img { height: 32px; width: auto; display: block; }
    nav .badge {
      font-size: 10px;
      font-weight: 500;
      color: var(--blue);
      border: 1px solid rgba(0,161,224,0.4);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 28px 72px;
      position: relative;
      overflow: hidden;
    }

    .hero-bg-glow {
      position: absolute;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,161,224,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-bg-glow2 {
      position: absolute;
      bottom: -80px; left: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(0,201,167,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Checkmark circle */
    .check-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(0,201,167,0.12);
      border: 1.5px solid rgba(0,201,167,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    .check-wrap svg {
      width: 32px;
      height: 32px;
      stroke: var(--accent);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .check-path {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: drawCheck 0.4s ease 0.4s forwards;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    .event-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(0,161,224,0.12);
      border: 1px solid rgba(0,161,224,0.3);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--blue);
      margin-bottom: 24px;
      letter-spacing: 0.3px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s forwards;
    }
    .event-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.35s forwards;
    }
    h1 .highlight { color: var(--blue); }

    .hero-sub {
      font-size: 15px;
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 36px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.45s forwards;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--blue);
      color: var(--white);
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.2px;
      transition: background 0.2s, transform 0.15s;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.55s forwards;
    }
    .back-btn:hover { background: #0090C8; }
    .back-btn:active { transform: scale(0.97); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FOOTER ── */
    footer {
      background: rgba(1,15,33,0.6);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 24px;
      text-align: center;
    }
    footer img.footer-logo { height: 26px; width: auto; margin: 0 auto 10px; display: block; opacity: 0.85; }
    footer p { font-size: 12px; color: var(--gray); line-height: 1.6; }
    footer a { color: var(--blue); text-decoration: none; }
    .footer-socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
    }
    .footer-socials a {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s;
    }
    .footer-socials a:hover { border-color: var(--blue); }
    .footer-socials img { width: 16px; height: 16px; filter: brightness(0) invert(1); opacity: 0.7; }
  </style>
</head>
<body>

  <nav>
    <img src="../img/ctech1920png 1.png" alt="Cambalache Technologies" class="logo-img">
    <div class="badge">Salesforce Partner</div>
  </nav>

  <section class="hero">
    <div class="hero-bg-glow"></div>
    <div class="hero-bg-glow2"></div>

    <div class="check-wrap">
      <svg viewBox="0 0 24 24">
        <polyline class="check-path" points="4,13 9,18 20,7"/>
      </svg>
    </div>

    <div class="event-pill">
      <span class="dot"></span>
      Salesforce World Tour · Buenos Aires 2026
    </div>

    <h1>¡Gracias por<br><span class="highlight">escribirnos!</span></h1>

    <p class="hero-sub">
      Un especialista de Cambalache Technologies se va a contactar con vos a la brevedad.
    </p>

    <a href="index.html" class="back-btn">← Volver al inicio</a>
  </section>

  <footer>
    <img src="../img/ctech1920png 1.png" alt="Cambalache Technologies" class="footer-logo">
    <p>info@c-tech.com.ar · <a href="tel:+5491151246444">+54 9 11 5124-6444</a></p>
    <p>Buenos Aires, Argentina</p>
    <div class="footer-socials">
      <a href="https://www.linkedin.com/company/cambalachetechnologies/" target="_blank" rel="noopener noreferrer">
        <img src="../img/linkedin.png" alt="LinkedIn">
      </a>
      <a href="https://www.instagram.com/cambalachetechnologies/" target="_blank" rel="noopener noreferrer">
        <img src="../img/instagram.png" alt="Instagram">
      </a>
    </div>
  </footer>

</body>
</html>
