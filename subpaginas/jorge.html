<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jorge Blanco — Cambalache Technologies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #00A1E0;
      --dark:    #032D60;
      --darker:  #010F21;
      --white:   #FFFFFF;
      --offwhite:#F0F4FA;
      --gray:    #8A9BB5;
      --accent:  #00C9A7;
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--darker);
      color: var(--white);
      overflow-x: hidden;
    }

    .glow-top {
      position: fixed; top: -120px; right: -80px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(0,161,224,0.18) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .glow-bottom {
      position: fixed; bottom: -100px; left: -60px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,201,167,0.10) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px;
      background: rgba(1,15,33,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,161,224,0.15);
    }
    nav img { height: 28px; width: auto; }
    nav .badge {
      font-size: 10px; font-weight: 500; color: var(--blue);
      border: 1px solid rgba(0,161,224,0.4);
      padding: 4px 10px; border-radius: 20px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }

    main {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 24px 64px;
      min-height: calc(100vh - 62px);
    }

    .event-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(0,161,224,0.12);
      border: 1px solid rgba(0,161,224,0.3);
      border-radius: 20px; padding: 6px 14px;
      font-size: 11px; font-weight: 500; color: var(--blue);
      margin-bottom: 32px; letter-spacing: 0.3px;
      animation: fadeUp 0.5s ease 0.1s both;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }

    .card {
      width: 100%; max-width: 380px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 32px 28px 28px;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    /* Estilo para Iniciales JB */
    .photo-wrap {
      width: 100px; height: 100px;
      border-radius: 50%;
      margin: 0 auto 20px;
      border: 2.5px solid rgba(0,161,224,0.5);
      background: var(--dark);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 1px;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 800;
      text-align: center; letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .role {
      font-size: 14px; color: var(--blue); font-weight: 500;
      text-align: center; margin-bottom: 6px;
    }
    .company {
      font-size: 12px; color: var(--gray);
      text-align: center; margin-bottom: 28px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-bottom: 24px;
    }

    .contacts { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
    .contact-item {
      display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: inherit;
    }
    .contact-item:hover .icon-wrap { border-color: var(--blue); }
    .icon-wrap {
      width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s;
    }
    .icon-wrap svg { width: 18px; height: 18px; }
    .contact-label { font-size: 11px; color: var(--gray); margin-bottom: 2px; }
    .contact-value { font-size: 14px; font-weight: 500; color: var(--white); }

    .btn-save {
      width: 100%;
      padding: 15px;
      background: var(--blue);
      color: var(--white);
      border: none; border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.2px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .btn-save:hover { background: #0090C8; }
    .btn-save:active { transform: scale(0.98); }

    .btn-linkedin {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: var(--blue);
      border: 1px solid rgba(0,161,224,0.4);
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
    }
    .btn-linkedin:hover { border-color: var(--blue); background: rgba(0,161,224,0.08); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <nav>
    <img src="img/ctech1920png 1.png" alt="Cambalache Technologies">
    <div class="badge">Salesforce Partner</div>
  </nav>

  <main>
    <div class="event-pill">
      <span class="dot"></span>
      Salesforce World Tour · Madrid 2026
    </div>

    <div class="card">

      <div class="photo-wrap">
        JB
      </div>

      <div class="name">Jorge Blanco Dilarregui</div>
      <div class="role">CFO</div>
      <div class="company">Cambalache Technologies</div>

      <div class="divider"></div>

      <div class="contacts">

        <a class="contact-item" href="tel:+34616282305">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#00A1E0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 014 1.18 2 2 0 016 3.18v3a2 2 0 01-1.44 1.93 16 16 0 00.48 5.1A16 16 0 0020.99 14.5 2 2 0 0122 16.92z"/>
            </svg>
          </div>
          <div>
            <div class="contact-label">Teléfono</div>
            <div class="contact-value">+34 616 28 23 05</div>
          </div>
        </a>

        <a class="contact-item" href="mailto:jorge.blanco@c-tech.com">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#00A1E0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
          </div>
          <div>
            <div class="contact-label">Email</div>
            <div class="contact-value">jorge.blanco@c-tech.com</div>
          </div>
        </a>

        <a class="contact-item" href="https://www.linkedin.com/in/jorgeblancodilarregui/" target="_blank" rel="noopener">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="#00A1E0">
              <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
              <circle cx="4" cy="4" r="2"/>
            </svg>
          </div>
          <div>
            <div class="contact-label">LinkedIn</div>
            <div class="contact-value">jorgeblancodilarregui</div>
          </div>
        </a>

      </div>

      <a class="btn-save" id="vcf-btn" download="Jorge_Blanco.vcf">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Guardar contacto
      </a>

      <a class="btn-linkedin" href="https://www.linkedin.com/in/jorgeblancodilarregui/" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
        Ver perfil en LinkedIn
      </a>

    </div>
  </main>

  <script>
    const vcf = `BEGIN:VCARD
VERSION:3.0
FN:Jorge Blanco Dilarregui
N:Blanco Dilarregui;Jorge;;;
ORG:Cambalache Technologies
TITLE:CFO
TEL;TYPE=CELL:+34616282305
EMAIL:jorge.blanco@c-tech.com
URL:https://www.linkedin.com/in/jorgeblancodilarregui/
END:VCARD`;

    const blob = new Blob([vcf], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    document.getElementById('vcf-btn').href = url;
  </script>

</body>
</html>
